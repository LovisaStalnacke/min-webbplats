<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilder</title>
    <meta name="description"
        content="Upplev Hotell Naturen i bilder! Kika in i våra mysiga rum och härliga poolområde!">
    <link rel="stylesheet" href="stylesheet.css">
</head>

<body>
    <header class="header-grid">
        <div class="item a">
            <b>HN</b>
        </div>
        <div class="item b">
            <h1>Hotell Naturen</h1>
        </div>
    </header>

    <main class="main-grid">

        <nav class="item c">
            <a href="index.html">Hem</a>
            <a href="boka.html">Boka</a>
            <a href="kontakt.html">Kontakt</a>
            <a href="bilder.html">Bilder</a>
        </nav>

        <div class="item k">
            <div class="slideshow-container">
                <div class="mySlides fade">
                    <div class="numbertext">1 / 3</div>
                    <img src="Bilder/pool-day.webp" alt="pool-day" style="width:100%">
                    <div class="text">Solbäddar vid poolen</div>
                </div>

                <div class="mySlides fade">
                    <div class="numbertext">2 / 3</div>
                    <img src="Bilder/room.webp" alt="room" style="width:100%">
                    <div class="text">Ett av våra mysiga hotellrum</div>
                </div>

                <div class="mySlides fade">
                    <div class="numbertext">3 / 3</div>
                    <img src="Bilder/pool-night.webp" alt="pool-night" style="width:100%">
                    <div class="text">Njut av hotellet på kvällen</div>
                </div>

                <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
                <a class="next" onclick="plusSlides(1)">&#10095;</a>

            </div>
            <br>

            <div style="text-align:center">
                <span class="dot" onclick="currentSlide(1)"></span>
                <span class="dot" onclick="currentSlide(2)"></span>
                <span class="dot" onclick="currentSlide(3)"></span>
            </div>

            <script>
                let slideIndex = 1;
                showSlides(slideIndex);

                function plusSlides(n) {
                    showSlides(slideIndex += n);
                }

                function currentSlide(n) {
                    showSlides(slideIndex = n);
                }

                function showSlides(n) {
                    let i;
                    let slides = document.getElementsByClassName("mySlides");
                    let dots = document.getElementsByClassName("dot");

                    if (n > slides.length) {
                        slideIndex = 1
                    }

                    if (n < 1) {
                        slideIndex = slides.length
                    }

                    for (i = 0; i < slides.length; i++) {
                        slides[i].style.display = "none";
                    }

                    for (i = 0; i < dots.length; i++) {
                        dots[i].className = dots[i].className.replace(" active", "");
                    }

                    slides[slideIndex - 1].style.display = "block";
                    dots[slideIndex - 1].className += " active";
                }
            </script>

        </div>

    </main>

    <footer>
        <div class="item f">
            <p>Hotell Naturen | Skogsgatan 2 | 08-123 45 67 | hotell.naturen@mail.se</p>
        </div>
    </footer>
</body>

</html>

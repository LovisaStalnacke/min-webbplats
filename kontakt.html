<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt</title>
    <link rel="stylesheet" href="stylesheet.css">
    <meta name="description"
        content="Hitta till Hotell Naturen eller kontakta oss. Här hittar du vårt kontaktformulär.">
</head>

<body>
    <header class="header-grid">
        <div class="item a">
            <b>HN</b>
        </div>
        <div class="item b">
            <h1>Hotell Naturen</h1>
        </div>
    </header>

    <main class="main-grid">

        <nav class="item c">
            <a href="index.html">Hem</a>
            <a href="boka.html">Boka</a>
            <a href="kontakt.html">Kontakt</a>
            <a href="bilder.html">Bilder</a>
        </nav>

        <div class="item i">
            <h2>Kontaktformulär</h2>
            <form action="exempel.se/mapp" method="post">
                <label for="name">Namn:</label>
                <input type="text" id="name" name="namn"><br>

                <label for="tel">Telefon:</label>
                <input type="tel" id="tel" name="telefon"><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email"><br>

                <label for="textarea">Meddelande:</label><br>
                <textarea id="textarea" name="meddelande" cols="40" rows="10"></textarea>

                <button type="submit">Skicka</button>
            </form>
        </div>

        <div class="item j">
            <h2>Hitta till oss</h2>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d44701.516032836575!2d98.95806795388125!3d7.9893177824593336!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ssv!2sse!4v1781699547237!5m2!1ssv!2sse"
                width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade" title="Karta över vårt Hotell"></iframe>
        </div>

    </main>

    <footer>
        <div class="item f">
            <p>Hotell Naturen | Skogsgatan 2 | 08-123 45 67 | hotell.naturen@mail.se</p>
        </div>
    </footer>
</body>

</html>
